naftiko: 1.0.0-alpha2
info:
  label: Epidemic Sound Partner Content API — Safelisting
  description: >-
    Manage safelisting licenses that authorize end-user channels (e.g.,
    YouTube creators) to monetize content using Epidemic Sound music.
  tags:
    - Epidemic Sound
    - Safelisting
    - Licensing
    - Monetization
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      EPIDEMIC_SOUND_API_KEY: EPIDEMIC_SOUND_API_KEY
capability:
  consumes:
    - type: http
      namespace: safelisting
      baseUri: https://partner-content-api.epidemicsound.com
      description: Safelisting license CRUD.
      resources:
        - name: licenses
          path: /v0/safelisting/licenses
          operations:
            - name: listLicenses
              method: GET
              description: List safelisting licenses.
            - name: createLicense
              method: POST
              description: Create a safelisting license for an end user.
            - name: deleteAllLicenses
              method: DELETE
              description: Delete all licenses for an end user.
        - name: license-by-id
          path: /v0/safelisting/licenses/{licenseId}
          operations:
            - name: getLicense
              method: GET
              description: Get a single safelisting license.
              inputParameters:
                - name: licenseId
                  in: path
                  type: string
                  required: true
            - name: updateLicense
              method: PATCH
              description: Update a safelisting license.
              inputParameters:
                - name: licenseId
                  in: path
                  type: string
                  required: true
            - name: deleteLicense
              method: DELETE
              description: Delete a safelisting license.
              inputParameters:
                - name: licenseId
                  in: path
                  type: string
                  required: true
      authentication:
        type: apikey
        key: x-api-key
        value: '{{env.EPIDEMIC_SOUND_API_KEY}}'
        placement: header
