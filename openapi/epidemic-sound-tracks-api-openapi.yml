      security:
      - UserAuth: []
      - EpidemicSoundConnectAuth: []
      - ApiKeyAuth: []
components:
  schemas:
    TrackResponse:
      required:
      - added
      - bpm
      - featuredArtists
      - genres
      - id
      - length
      - mainArtists
      - moods
      - title
      - waveformUrl
      type: object
      properties:
        id:
          type: string
          description: Unique ID of the track
        mainArtists:
          type: array
          description: The main artist that created the track.
          items:
            type: string
            description: The main artist that created the track.
        featuredArtists:
          type: array
          description: Additional artists that contributed to the track.
          items:
            type: string
            description: Additional artists that contributed to the track.
        title:
          type: string
          description: Title of the track
        bpm:
          type: integer
          description: Beats per minute for the track.
          format: int32
        length:
          type: integer
          description: Track length in seconds
          format: int32
        moods:
          type: array
          description: Lists the moods of the track.
          items:
            $ref: '#/components/schemas/MoodResponse'
        genres:
          type: array
          description: Lists the genres of the track.
          items:
            $ref: '#/components/schemas/GenreResponse'
        images:
          $ref: '#/components/schemas/ImagesResponse'
        waveformUrl:
          type: string
          description: Reference to the waveform as a json object.
        hasVocals:
          type: boolean
          description: Set to true if the track has vocals. Set to false for instrumental tracks.
          nullable: true
        added:
          type: string
          description: The date the track was released in the format YYYY-mm-dd.
        tierOption:
          type: string
          nullable: true
          enum:
          - PAID
          - FREE
        isExplicit:
          type: boolean
          nullable: true
        isPreviewOnly:
          type: boolean
    TaxonomyAggregations:
      type: object
      properties:
        moods:
          type: array
          items:
            $ref: '#/components/schemas/TaxonomyAggregation'
        genres:
          type: array
          items:
            $ref: '#/components/schemas/TaxonomyAggregation'
    DownloadResponse:
      required:
      - expires
      - url
      type: object
      properties:
        url:
          type: string
        expires:
          type: string
    TracksResponse:
      required:
      - links
      - pagination
      - tracks
      type: object
      properties:
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/TrackResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        aggregations:
          $ref: '#/components/schemas/TaxonomyAggregations'
    GenreResponse:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        parent:
          $ref: '#/components/schemas/ParentGenreResponse'
    HighlightsResponse:
      required:
      - highlights
      type: object
      properties:
        highlights:
          type: array
          items:
            $ref: '#/components/schemas/HighlightSectionResponse'
    ImagesResponse:
      type: object
      properties:
        default:
          type: string
          nullable: true
        L:
          type: string
          nullable: true
        M:
          type: string
          nullable: true
        S:
          type: string
          nullable: true
        XS:
          type: string
          nullable: true
    Pagination:
      required:
      - limit
      - page
      type: object
      properties:
        page:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
    TrackSectionPaginatedResponse:
      required:
      - links
      - pagination
      - trackSections
      type: object
      properties:
        trackSections:
          type: array
          items:
            $ref: '#/components/schemas/TrackSectionResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    HLSDownloadResponse:
      required:
      - cookie
      - url
      type: object
      properties:
        url:
          type: string
        cookie:
          $ref: '#/components/schemas/HLSCookieResponse'
    HighlightSectionResponse:
      required:
      - duration
      - from
      - to
      type: object
      properties:
        from:
          type: integer
          format: int32
        to:
          type: integer
          format: int32
        duration:
          type: integer
          format: int32
    PaginationLinks:
      type: object
      properties:
        next:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
    ParentGenreResponse:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: string
          description: Unique ID of the parent genre
        name:
          type: string
          description: Name of the parent genre
    HLSCookieResponse:
      required:
      - domain
      - expires
      - name
      - path
      - value
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        path:
          type: string
        value:
          type: string
        expires:
          type: string
    TrackParametersResponse:
      required:
      - genres
      - moods
      type: object
      properties:
        genres:
          type: array
          items:
            $ref: '#/components/schemas/GenreResponse'
        moods:
          type: array
          items:
            $ref: '#/components/schemas/MoodResponse'
    TaxonomyAggregation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        count:
          type: integer
          format: int32
    Error:
      required:
      - key
      - messages
      type: object
      properties:
        key:
          type: string
          description: Error key
        messages:
          type: array
          description: Error messages
          items:
            type: string
            description: Error messages
    MessageResponse:
      required:
      - message
      type: object
      properties:
        message:
          type: string
          description: Human readable message
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
    MoodResponse:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: string
          description: Unique ID of the mood
        name:
          type: string
          description: Name of the mood
    TrackSectionResponse:
      required:
      - end
      - start
      - track
      type: object
      properties:
        track:
          $ref: '#/components/schemas/TrackResponse'
        start:
          type: integer
          format: int32
        end:
          type: integer
          format: int32
  parameters:
    genre:
      name: genre
      in: query
      description: Id for genre
      required: false
      schema:
        type: array
        items:
          type: string
    format:
      name: format
      in: query
      description: Track format
      required: false
      schema:
        type: string
        enum:
        - mp3
    offset:
      name: offset
      in: query
      description: Index of the entry track in the response
      required: false
      schema:
        type: integer
        format: int32
    duration:
      name: duration
      in: query
      description: The highlight duration in seconds
      required: false
      schema:
        type: array
        items:
          type: integer
          format: int32
    limit:
      name: limit
      in: query
      description: Max number of entries returned in the response, default 50 and max 100
      required: false
      schema:
        type: integer
        format: int32
    bpmMax:
      name: bpmMax
      in: query
      description: BPM Max
      required: false
      schema:
        type: integer
        format: int32
    bpmMin:
      name: bpmMin
      in: query
      description: BPM Min
      required: false
      schema:
        type: integer
        format: int32
    imageId:
      name: imageId
      in: path
      description: Image id
      required: true
      schema:
        type: string
    quality:
      name: quality
      in: query
      description: Track quality, normal is used as the default if not specified
      required: false
      schema:
        type: string
        enum:
        - normal
        - high
        default: normal
    trackId:
      name: trackId
      in: path
      description: Track id
      required: true
      schema:
        type: string
    mood:
      name: mood
      in: query
      description: Id for mood
      required: false
      schema:
        type: array
        items:
          type: string
  securitySchemes:
    ApiKeyAuth:
      type: http
      description: 'API key authentication for server-to-server communication.

        Pass your API key as a Bearer token in the Authorization header.

        API keys are prefixed with `epidemic_live_`.


        > **Example Header:** `Authorization: Bearer epidemic_live_your-api-key`'
      scheme: bearer
    PartnerAuth:
      type: http
      description: 'Partner authentication is handled with short lived partner access tokens.

        Use your api credentials to request these tokens.

        The access token is of JWT format and should be passed in a header with your API requests:


        > **Example Header:** `Authorization: Bearer your-partner-token`'
      scheme: Bearer
    UserAuth:
      type: http
      description: "User authentication is handled with short lived user access tokens.\n Use a partner token to request these tokens.\n The access token is of JWT format and should be passed in a header with your API requests:\n\n > **Example Header:** `Authorization: Bearer a-user-token`"
      scheme: Bearer
    EpidemicSoundConnectAuth:
      type: oauth2
      description: 'For users signing in with an Epidemic Sound account, user authentication is

        handled with OpenID Connect, which is a layer on top of OAuth 2.0.


        > **Example Header:** `Authorization: Bearer es-connect-token`'
      flows:
        authorizationCode:
          authorizationUrl: https://login.epidemicsound.com/auth/realms/accounts/protocol/openid-connect/auth
          tokenUrl: https://login.epidemicsound.com/auth/realms/accounts/protocol/openid-connect/token
          scopes: {}
