  /v0/safelisting/licenses:
    get:
      tags:
      - Safelisting
      summary: List safelisting licenses
      description: List safelisting licenses for the specified end user. Supports filtering by asset type, platform, and status, with pagination and sorting.
      operationId: GET_Safelisting_Licenses
      parameters:
      - name: X-Partner-User-Id
        in: header
        description: The partner's end user identifier. Used to scope licenses per end user.
        required: true
      - name: assetType
        in: query
        description: Filter by asset type
        required: true
        schema:
          type: string
          enum:
          - channel
          - video
      - name: platform
        in: query
        description: Filter by platform
        required: false
        schema:
          type: string
          enum:
          - youtube
          - instagram
          - facebook
          - twitch
          - tiktok
          - podcast
          - website
      - name: status
        in: query
        description: Filter by status. Currently only `active` licenses are returned.
        required: false
        schema:
          type: string
          enum:
          - active
      - name: sortBy
        in: query
        description: Field to sort results by
        required: false
        schema:
          type: string
          enum:
          - createdAt
          - expiresAt
          default: expiresAt
      - name: sortOrder
        in: query
        description: Sort direction
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: page
        in: query
        description: Page number (1-based)
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: pageSize
        in: query
        description: Number of results per page
        required: false
        schema:
          type: integer
          format: int32
          default: 25
      responses:
        '200':
          description: License list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafelistingLicenseListResponse'
              example:
                page: 1
                pageSize: 25
                totalItems: 1
                data:
                - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  createdAt: '2024-06-01T10:00:00Z'
                  expiresAt: '2026-12-31T23:59:59Z'
                  asset:
                    id: UCxxxxxxxxxxxxxxxxxx
                    type: channel
                    platform: youtube
                    url: https://www.youtube.com/@somechannel
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Bad request
        '401':
          description: Unauthorized. Most likely your access token has expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid credentials
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Rate limit exceeded
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - Safelisting
      summary: Create a safelisting license
      description: Create a new safelisting license for a channel or video. The `X-Partner-User-Id` header is required to scope the license to a specific end user.
      operationId: POST_Safelisting_License
      parameters:
      - name: X-Partner-User-Id
        in: header
        description: The partner's end user identifier. Used to scope licenses per end user.
        required: true
      requestBody:
        description: License creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSafelistingLicenseRequest'
            example:
              asset:
                type: channel
                platform: youtube
                url: https://www.youtube.com/@somechannel
              expiresAt: '2026-12-31T23:59:59Z'
        required: true
      responses:
        '201':
          description: Created license
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafelistingLicenseResponse'
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                createdAt: '2024-06-01T10:00:00Z'
                expiresAt: '2026-12-31T23:59:59Z'
                asset:
                  id: UCxxxxxxxxxxxxxxxxxx
                  type: channel
                  platform: youtube
                  url: https://www.youtube.com/@somechannel
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Bad request
        '401':
          description: Unauthorized. Most likely your access token has expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid credentials
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Rate limit exceeded
        '409':
          description: Asset already safelisted by another user in this workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Conflict
        '403':
          description: Workspace does not have safelisting entitlement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Forbidden
      security:
      - ApiKeyAuth: []
    delete:
      tags:
      - Safelisting
      summary: Delete all licenses for an end user
      description: Expires all active licenses for the specified end user within the workspace. Intended for end-user churn scenarios (e.g. when a user cancels their subscription). Returns 204 regardless of whether the user had any active licenses.
      operationId: DELETE_Safelisting_Licenses
      parameters:
      - name: X-Partner-User-Id
        in: header
        description: The partner's end user identifier. Used to scope licenses per end user.
        required: true
      responses:
        '204':
          description: All licenses expired successfully
        '401':
          description: Unauthorized. Most likely your access token has expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid credentials
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Rate limit exceeded
      security:
      - ApiKeyAuth: []
