  parameters:
    collectionId:
      name: collectionId
      in: path
      description: Collection id
      required: true
      schema:
        type: string
    excludeField:
      name: excludeField
      in: query
      description: Add parameter if tracks should be excluded in the response
      required: false
      schema:
        type: string
        enum:
        - tracks
    expand:
      name: expand
      in: query
      description: Add parameter if tracks should be included in the response
      required: false
      schema:
        type: string
        enum:
        - tracks
    genre:
      name: genre
      in: query
      description: Id for genre
      required: false
      schema:
        type: array
        items:
          type: string
    trackId:
      name: trackId
      in: path
      description: Track id
      required: true
      schema:
        type: string
    term:
      name: term
      in: query
      description: Term for search
      required: false
      schema:
        type: string
    mood:
      name: mood
      in: query
      description: Id for mood
      required: false
      schema:
        type: array
        items:
          type: string
    limit:
      name: limit
      in: query
      description: Max number of entries returned in the response, default 50 and max 100
      required: false
      schema:
        type: integer
        format: int32
    offset:
      name: offset
      in: query
      description: Index of the entry track in the response
      required: false
      schema:
        type: integer
        format: int32
    bpmMin:
      name: bpmMin
      in: query
      description: BPM Min
      required: false
      schema:
        type: integer
        format: int32
    bpmMax:
      name: bpmMax
      in: query
      description: BPM Max
      required: false
      schema:
        type: integer
        format: int32
    imageId:
      name: imageId
      in: path
      description: Image id
      required: true
      schema:
        type: string
    checksum:
      name: checksum
      in: path
      description: File checksum
      required: true
      schema:
        type: string
    audioIdOrChecksum:
      name: audioIdOrChecksum
      in: path
      description: Audio upload id or checksum of audio file
      required: true
      schema:
        type: string
    moodId:
      name: moodId
      in: path
      description: Mood id
      required: true
      schema:
        type: string
    genreId:
      name: genreId
      in: path
      description: Genre id
      required: true
      schema:
        type: string
    categoryId:
      name: categoryId
      in: path
      description: Category id
      required: true
      schema:
        type: string
        format: uuid
    format:
      name: format
      in: query
      description: Track format
      required: false
      schema:
        type: string
        enum:
        - mp3
    quality:
      name: quality
      in: query
      description: Track quality, normal is used as the default if not specified
      required: false
      schema:
        type: string
        enum:
        - normal
        - high
        default: normal
    sort:
      name: sort
      in: query
      description: 'Sorting options. Available values: alphabetic, relevance'
      required: false
      schema:
        type: string
        enum:
        - alphabetic
        - relevance
        default: relevance
    order:
      name: order
      in: query
      description: 'Order options. Available values: asc, desc'
      required: false
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
    type:
      name: type
      in: query
      description: "Types to filter by:\n  * `all` - all the objects in the Epidemic Sound library\n  * `partner-tier` - objects available to the partner within their tier\n  * `featured` - only objects featured and curated by Epidemic Sound"
      required: false
      schema:
        type: string
        enum:
        - all
        - featured
        - partner-tier
        default: all
    duration:
      name: duration
      in: query
      description: The highlight duration in seconds
      required: false
      schema:
        type: array
        items:
          type: integer
          format: int32
  securitySchemes:
    ApiKeyAuth:
      type: http
      description: 'API key authentication for server-to-server communication.

        Pass your API key as a Bearer token in the Authorization header.

        API keys are prefixed with `epidemic_live_`.


        > **Example Header:** `Authorization: Bearer epidemic_live_your-api-key`'
      scheme: bearer
    PartnerAuth:
      type: http
      description: 'Partner authentication is handled with short lived partner access tokens.

        Use your api credentials to request these tokens.

        The access token is of JWT format and should be passed in a header with your API requests:


        > **Example Header:** `Authorization: Bearer your-partner-token`'
      scheme: Bearer
    UserAuth:
      type: http
      description: "User authentication is handled with short lived user access tokens.\n Use a partner token to request these tokens.\n The access token is of JWT format and should be passed in a header with your API requests:\n\n > **Example Header:** `Authorization: Bearer a-user-token`"
      scheme: Bearer
    EpidemicSoundConnectAuth:
      type: oauth2
      description: 'For users signing in with an Epidemic Sound account, user authentication is

        handled with OpenID Connect, which is a layer on top of OAuth 2.0.


        > **Example Header:** `Authorization: Bearer es-connect-token`'
      flows:
        authorizationCode:
          authorizationUrl: https://login.epidemicsound.com/auth/realms/accounts/protocol/openid-connect/auth
          tokenUrl: https://login.epidemicsound.com/auth/realms/accounts/protocol/openid-connect/token
          scopes: {}
