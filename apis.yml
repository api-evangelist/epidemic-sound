apis:
  - aid: epidemic-sound:epidemic-sound-partner-content-api
    name: Epidemic Sound Partner Content API
    description: >-
      Single REST API exposing the entire Epidemic Sound catalog — tracks, collections, moods, genres, sound effects,
      stems, beats, HLS previews, similar-track/section search, image-based and video-based matching, track-versions
      generation (beta), AI voiceovers (via the MCP tools), partner audio/image uploads, usage reporting, and
      safelisting licenses for end-user channels. Authenticates with ApiKey (`x-api-key`), Partner Token (bearer), or
      Epidemic Sound Connect OAuth (user-scoped). Versioned with `/v0/` path prefix. Hosted in Europe; audio delivered
      via Fastly's global CDN. No local caching of metadata or collections is permitted by the partner terms.
    humanURL: https://developers.epidemicsound.com/docs/
    baseURL: https://partner-content-api.epidemicsound.com
