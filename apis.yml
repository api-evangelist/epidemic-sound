aid: epidemic-sound
name: Epidemic Sound
description: >-
  Epidemic Sound is a Stockholm-based royalty-free music and sound effects licensing platform for video creators,
  businesses, and platforms. The catalog includes 55,000+ tracks across 390 genres, 250,000+ sound effects, stems and
  instrumental versions, all under an all-inclusive license that covers mechanical, sync, and public performance rights
  globally. The Partner Content API ("Epidemic Sound Connect") exposes the full catalog and Epidemic Sound's AI-powered
  soundtracking tools — Soundmatch (video-to-music recommendation), semantic search, similar-track and similar-section
  lookup, image-based matching, beat detection, HLS streaming previews, AI voiceover generation, and the new
  track-versions endpoint that adapts a recording to a target duration while preserving musical structure. An official
  Model Context Protocol (MCP) server (beta) makes the same catalog and tools available to AI agents at
  https://www.epidemicsound.com/a/mcp-service/mcp. Access to the Partner API is gated behind a partnership agreement;
  once signed, partner engineers receive credentials via the Developer Portal and authenticate using API Key, Partner
  Token, or Epidemic Sound Connect (OAuth 2.0).
